# uses Trivy imge scanner for CVEs
name: Image Scanner

on:
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest

        steps:
             - name: Login to Docker Hub
               uses: docker/login-action@v3
               with:
                username: ${{vars.USER_DOCKERHUB}}
                password: ${{secrets.USER_DOCKERHUB_TOKEN}}

             - name: Run Trivy Scan
               uses: aquasecurity/trivy-action@0.35.0
               with:
                image-ref: github-actions-app:${{ github.sha }}
                format: table