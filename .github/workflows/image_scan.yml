# uses Trivy imge scanner for CVEs
name: Image Scanner

on:
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest

        steps:
             - name: Login to Docker Hub
               uses: docker/login-action@v3
               with:
                username: ${{vars.USER_DOCKERHUB}}
                password: ${{secrets.USER_DOCKERHUB_TOKEN}}

             - name : Trivy Scanner
               uses: aquasecurity/trivy-action@0.33.1
               with:
                severity: 'CRITICAL'
                exit-code: '1'