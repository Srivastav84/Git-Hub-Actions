# this willdeploy the safe / secure / tested app to prod server
name: Deploy to Server

on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DOCKERHUB_USER: ${{ vars. DOCKERHUB_USER }}
            DOCKER_TAG: ${{ github.event.workflow_run.head_sha }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set DOCKER_TAG environment variable
              run:
                echo "DOCKER_TAG=${{ github. event.workflow_run. head_sha }}" >> $GITHUB_ENV

            - name: SSH to PROD Server & Create App folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                scripts:
                    echo "installing required packages and folder"
                    sudo apt-ge update && sudo apt-get install docker.io docker-compose-v2 -y
                    sudo usermod -aG docker $USER
                    mkdir -p devops

            - name: copy the docker-compose file
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~/devops

            - name: SSH to PROD Server & Create App folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script:
                    echo " Running App"
                    export DOCKERHUB_USER=${{ vars. DOCKERHUB_USER }}
                    export DOCKER_TAG= ${{ github.event.workflow_run.head_sha }}
                    export DOCKER_TAG= ${{ github.sha }}
                    echo ${{ github.sha }}
                    echo password ${{secrets.USER_DOCKERHUB_TOKEN}} | docker login --username ${{vars.USER_DOCKERHUB}} --password-stdin
                    cd ~/devops && docker compose down && docker compose up -d --build --force-recreate --pull always

