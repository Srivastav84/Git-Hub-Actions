name: Deploy_Flask_App

on:
    workflow_dispatch:

jobs:   
    deploy:
        env:
            DOCKERHUB_USERNAME : ${{vars.USER_DOCKERHUB}}

        runs-on: self-hosted

        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: deploy with docker compose
              run: docker compose up -d --build

