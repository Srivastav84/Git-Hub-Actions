name: Docker Build_push

on:
     push:
         branches: [main]

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:

            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.USER_DOCKERHUB }}
                password: ${{ secrets.USER_DOCKERHUB_TOKEN }}

            - name: Build_and_Push to DockerHub
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                    ${{vars.USER_DOCKERHUB}}/github-actions-app:${{github.ref_name}}
                    ${{vars.USER_DOCKERHUB}}/github-actions-app:latest
                    ${{vars.USER_DOCKERHUB}}/github-actions-app:${{github.sha}}

